
trigger:
- master

pool:
  vmImage: ubuntu-latest



steps:
- script: echo k8s terraform azure!
- task: TerraformInstaller@1
  inputs:
    terraformVersion: '1.6.6'
- task: DownloadSecureFile@1
  inputs:
    secureFile: 'azure_rsa.pub'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/configuration/iaac/azure/kubernetes'
    commandOptions: '-var client_id-$(client_id) -var client_secret=$(client_secret) -var ssh_public_key=$(ssh_public_key)'
    backendServiceArm: 'azure-resource-service-connection'
    backendAzureRmResourceGroupName: 'dockerkubernetesadam'
    backendAzureRmStorageAccountName: 'storagedockerkubernetesadam'
    backendAzureRmContainerName: 'storagecontainerdockerkubernetesadam'
    backendAzureRmKey: 'kubernetes-dev.tfstate'
- task: DownloadSecureFile@1
  inputs:
    secureFile: 'azure_rsa.pub'
    backendAzureRmUseEntraIdForAuthentication: false
    backendServiceArm: 'azure-resource-service-connection'
    backendAzureRmResourceGroupName: 'terraform-backend-rg'
    backendAzureRmStorageAccountName: 'storageaccountadammouldxyz'
    backendAzureRmContainerName: 'storageaccountadammouldcontainer'
    backendAzureRmKey: 'kubernetes-dev.tfstate'
  displayName: 'Run a one-line script'
